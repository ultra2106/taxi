<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>領収書消しゴム</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #e0e0e0; font-family: Meiryo, 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

#toolbar {
  background: #16213e; border-bottom: 2px solid #0f3460;
  padding: 6px 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0;
}
.tg { display: flex; align-items: center; gap: 4px; padding-right: 8px; border-right: 1px solid #0f3460; }
.tg:last-child { border-right: none; }
label { font-size: 11px; color: #aaa; }
button {
  background: #0f3460; color: #e0e0e0; border: 1px solid #1a4a8a;
  border-radius: 5px; padding: 4px 10px; cursor: pointer; font-size: 12px;
  transition: background .15s;
}
button:hover { background: #1a5ab8; }
button.active { background: #e94560; border-color: #ff6b8a; }
button:disabled { opacity: .4; cursor: not-allowed; }
input[type=range] { width: 70px; accent-color: #e94560; }
.vb { background: #0f3460; border-radius: 3px; padding: 1px 5px; font-size: 11px; min-width: 26px; text-align: center; }
#swatch { width: 22px; height: 22px; border-radius: 4px; border: 2px solid #555; display: none; }

#workspace { flex: 1; display: flex; overflow: hidden; position: relative; }

#canvaswrap {
  flex: 1; overflow: hidden; position: relative;
  background: #111;
}
#canvaswrap canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; }
#cImg  { z-index: 1; }
#cMask { z-index: 2; }
#cUI   { z-index: 3; cursor: crosshair; }

#dropzone {
  position: absolute; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(10,15,40,.95); gap: 14px;
}
#dropzone.hidden { display: none; }
#dropzone .ico { font-size: 60px; }
#dropzone p { font-size: 14px; color: #bbb; }
#dropzone button { font-size: 14px; padding: 8px 24px; }

#toast {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.75); color: #fff; padding: 4px 16px;
  border-radius: 20px; font-size: 12px; pointer-events: none;
  z-index: 30; opacity: 0; transition: opacity .3s;
}
#toast.show { opacity: 1; }
#zoominfo {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(0,0,0,.5); color: #aaa; font-size: 11px;
  padding: 3px 8px; border-radius: 10px; pointer-events: none; z-index: 20;
}
</style>
</head>
<body>

<div id="toolbar">
  <div class="tg">
    <button id="btnOpen">📂 開く</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <button id="btnSave" disabled>💾 保存</button>
  </div>
  <div class="tg">
    <label>モード:</label>
    <button id="btnBrush" class="active">🖌 ブラシ</button>
    <button id="btnPick">🎨 色抽出</button>
    <button id="btnFill">🪣 塗り</button>
    <div id="swatch" title="抽出色"></div>
  </div>
  <div class="tg">
    <label>ブラシ:</label>
    <input type="range" id="slBrush" min="2" max="120" value="18">
    <span class="vb" id="vBrush">18</span>
  </div>
  <div class="tg">
    <label>半径:</label>
    <input type="range" id="slRadius" min="1" max="60" value="5">
    <span class="vb" id="vRadius">5</span>
    <button id="btnMethod">TELEA</button>
    <button id="btnInpaint" disabled>🔮 Inpaint</button>
  </div>
  <div class="tg">
    <button id="btnPaperFill" disabled>📄 紙色塗り</button>
    <button id="btnPickFill" disabled>🎨色塗り</button>
    <button id="btnUndo" disabled>↩ Undo</button>
    <button id="btnReset" disabled>🗑 リセット</button>
  </div>
  <div class="tg">
    <button id="btnFit" disabled>⊡ Fit</button>
    <button id="btn100" disabled>100%</button>
  </div>
</div>

<div id="workspace">
  <div id="canvaswrap">
    <canvas id="cImg"></canvas>
    <canvas id="cMask"></canvas>
    <canvas id="cUI"></canvas>

    <div id="dropzone">
      <div class="ico">🧾</div>
      <p>画像をここにドロップ</p>
      <p style="font-size:12px;color:#555">または</p>
      <button id="btnOpen2">📂 ファイルを選択</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="zoominfo">—</div>

<script>
// ─── State ───
const S = {
  srcCanvas: null,   // オリジナルデータを保持するOffscreenCanvas
  workCanvas: null,  // 編集中データ
  W: 0, H: 0,
  mask: null,        // Uint8Array
  previewData: null, // inpaint結果 ImageData

  mode: 'brush',
  brushSize: 18,
  ipRadius: 5,
  ipMethod: 'telea',
  pickedColor: null,

  drawing: false,
  erasing: false,
  lastPt: null,

  roiDrag: false,
  roiStart: null,
  roiEnd: null,

  zoom: 1,
  vx: 0, vy: 0,
  panStart: null,

  undoStack: [],
  MAXUNDO: 30,
};

// ─── DOM ───
const wrap     = document.getElementById('canvaswrap');
const cImg     = document.getElementById('cImg');
const cMask    = document.getElementById('cMask');
const cUI      = document.getElementById('cUI');
const ctxImg   = cImg.getContext('2d');
const ctxMask  = cMask.getContext('2d');
const ctxUI    = cUI.getContext('2d');

// ─── Toast ───
let toastTmr;
function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.classList.remove('show'), dur);
}

// ─── Load image ───
function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      S.W = img.naturalWidth;
      S.H = img.naturalHeight;

      S.workCanvas = new OffscreenCanvas(S.W, S.H);
      S.workCanvas.getContext('2d').drawImage(img, 0, 0);

      S.mask = new Uint8Array(S.W * S.H);
      S.undoStack = [];
      S.previewData = null;
      S.pickedColor = null;
      updateSwatch();

      document.getElementById('dropzone').classList.add('hidden');
      fitView();
      renderAll();
      updateBtns();
      toast(`読み込み完了: ${S.W}×${S.H}`);
    };
    img.onerror = () => toast('画像の読み込みに失敗しました');
    img.src = ev.target.result;
  };
  reader.onerror = () => toast('ファイルの読み込みに失敗しました');
  reader.readAsDataURL(file);
}

// ─── Zoom/Pan ───
function getScale() {
  const cropW = wrap.clientWidth / S.zoom;
  return wrap.clientWidth / cropW;
}
function clamp() {
  const cropW = wrap.clientWidth  / S.zoom;
  const cropH = wrap.clientHeight / S.zoom;
  S.vx = Math.max(0, Math.min(S.vx, Math.max(0, S.W - cropW)));
  S.vy = Math.max(0, Math.min(S.vy, Math.max(0, S.H - cropH)));
}
function fitView() {
  S.zoom = Math.min(wrap.clientWidth / S.W, wrap.clientHeight / S.H, 1);
  S.vx = 0; S.vy = 0; clamp();
}
function s2i(sx, sy) {
  const sc = getScale();
  return [
    Math.max(0, Math.min(S.W-1, Math.floor(S.vx + sx / sc))),
    Math.max(0, Math.min(S.H-1, Math.floor(S.vy + sy / sc))),
  ];
}
function i2s(ix, iy) {
  const sc = getScale();
  return [(ix - S.vx) * sc, (iy - S.vy) * sc];
}
function zoomAt(sx, sy, f) {
  const [ix, iy] = s2i(sx, sy);
  S.zoom = Math.max(0.05, Math.min(30, S.zoom * f));
  clamp();
  const sc = getScale();
  S.vx = ix - sx / sc;
  S.vy = iy - sy / sc;
  clamp();
}

// ─── Render ───
function renderAll() {
  if (!S.workCanvas) return;
  const dw = wrap.clientWidth, dh = wrap.clientHeight;

  // キャンバスサイズをウィンドウに合わせる
  [cImg, cMask, cUI].forEach(c => { c.width = dw; c.height = dh; });
  clamp();

  const sc = getScale();
  const cropW = dw / S.zoom;
  const cropH = dh / S.zoom;

  // ── 画像 ──
  ctxImg.clearRect(0, 0, dw, dh);
  ctxImg.imageSmoothingEnabled = S.zoom < 2;

  const src = S.previewData ? previewCanvas() : S.workCanvas;
  ctxImg.drawImage(src, S.vx, S.vy, cropW, cropH, 0, 0, dw, dh);

  // ── マスク ──
  ctxMask.clearRect(0, 0, dw, dh);
  if (!S.previewData) {
    const mOC = maskCanvas();
    ctxMask.globalAlpha = 0.5;
    ctxMask.drawImage(mOC, S.vx, S.vy, cropW, cropH, 0, 0, dw, dh);
    ctxMask.globalAlpha = 1;
  }

  // ── UI ──
  ctxUI.clearRect(0, 0, dw, dh);
  if (S.mode !== 'brush' && S.roiStart && S.roiEnd) {
    const [x0, y0] = i2s(...S.roiStart);
    const [x1, y1] = i2s(...S.roiEnd);
    ctxUI.strokeStyle = S.mode === 'pick' ? '#00f0f0' : '#f000f0';
    ctxUI.lineWidth = 1.5;
    ctxUI.setLineDash([5, 3]);
    ctxUI.strokeRect(x0, y0, x1 - x0, y1 - y0);
    ctxUI.setLineDash([]);
  }

  document.getElementById('zoominfo').textContent =
    `${Math.round(S.zoom * 100)}%  ${S.W}×${S.H}`;
}

function previewCanvas() {
  const oc = new OffscreenCanvas(S.W, S.H);
  oc.getContext('2d').putImageData(S.previewData, 0, 0);
  return oc;
}
function maskCanvas() {
  const oc = new OffscreenCanvas(S.W, S.H);
  const ctx = oc.getContext('2d');
  const id = ctx.createImageData(S.W, S.H);
  const d = id.data;
  S.mask.forEach((v, i) => {
    if (v) { d[i*4]=255; d[i*4+1]=50; d[i*4+2]=50; d[i*4+3]=200; }
  });
  ctx.putImageData(id, 0, 0);
  return oc;
}

// ─── Undo ───
function pushUndo() {
  S.undoStack.push(S.mask.slice());
  if (S.undoStack.length > S.MAXUNDO) S.undoStack.shift();
  updateBtns();
}
function undo() {
  if (!S.undoStack.length) return;
  S.mask = S.undoStack.pop();
  S.previewData = null;
  renderAll(); updateBtns();
}

// ─── Brush ───
function paintMask(x0, y0, x1, y1, erase) {
  const r = S.brushSize;
  const val = erase ? 0 : 255;
  const dx = x1-x0, dy = y1-y0;
  const steps = Math.max(1, Math.ceil(Math.hypot(dx, dy)));
  for (let s = 0; s <= steps; s++) {
    const t = s / steps;
    const cx = Math.round(x0 + dx * t), cy = Math.round(y0 + dy * t);
    for (let py = cy-r; py <= cy+r; py++) {
      for (let px = cx-r; px <= cx+r; px++) {
        if ((px-cx)**2+(py-cy)**2 <= r*r && px>=0 && py>=0 && px<S.W && py<S.H)
          S.mask[py*S.W+px] = val;
      }
    }
  }
}

// ─── Color ───
function medianRGB(pixels) {
  if (!pixels.length) return {r:200,g:200,b:200};
  const rs=[],gs=[],bs=[];
  pixels.forEach(p=>{rs.push(p.r);gs.push(p.g);bs.push(p.b);});
  rs.sort((a,b)=>a-b); gs.sort((a,b)=>a-b); bs.sort((a,b)=>a-b);
  const m = rs.length>>1;
  return {r:rs[m],g:gs[m],b:bs[m]};
}

function getWorkImageData() {
  return S.workCanvas.getContext('2d').getImageData(0, 0, S.W, S.H);
}
function putWorkImageData(id) {
  S.workCanvas.getContext('2d').putImageData(id, 0, 0);
}

function roiRect() {
  if (!S.roiStart || !S.roiEnd) return null;
  let [x0,y0]=S.roiStart, [x1,y1]=S.roiEnd;
  [x0,x1]=[Math.min(x0,x1),Math.max(x0,x1)];
  [y0,y1]=[Math.min(y0,y1),Math.max(y0,y1)];
  x0=Math.max(0,x0); y0=Math.max(0,y0);
  x1=Math.min(S.W,x1); y1=Math.min(S.H,y1);
  return (x1-x0<2||y1-y0<2) ? null : [x0,y0,x1,y1];
}

function pickColor() {
  const r = roiRect(); if (!r) { toast('範囲が小さすぎます'); return; }
  const [x0,y0,x1,y1] = r;
  const id = getWorkImageData();
  const px = [];
  for (let y=y0;y<y1;y++) for (let x=x0;x<x1;x++) {
    const i=(y*S.W+x)*4;
    px.push({r:id.data[i],g:id.data[i+1],b:id.data[i+2]});
  }
  S.pickedColor = medianRGB(px);
  updateSwatch();
  toast(`色抽出: rgb(${S.pickedColor.r},${S.pickedColor.g},${S.pickedColor.b})`);
}

function fillROI() {
  if (!S.pickedColor) { toast('先に🎨色抽出をしてください'); return; }
  const r = roiRect(); if (!r) { toast('範囲が小さすぎます'); return; }
  const [x0,y0,x1,y1]=r;
  const id = getWorkImageData();
  const {r:rr,g,b}=S.pickedColor;
  for (let y=y0;y<y1;y++) for (let x=x0;x<x1;x++) {
    const i=(y*S.W+x)*4;
    id.data[i]=rr; id.data[i+1]=g; id.data[i+2]=b; id.data[i+3]=255;
  }
  putWorkImageData(id);
  S.previewData=null; renderAll(); toast('塗りつぶしました');
}

function fillPaper() {
  if (!S.mask.some(v=>v)) { toast('マスクが空です'); return; }
  const id = getWorkImageData();
  const px=[];
  S.mask.forEach((v,i)=>{ if(!v) px.push({r:id.data[i*4],g:id.data[i*4+1],b:id.data[i*4+2]}); });
  const {r,g,b}=medianRGB(px);
  S.mask.forEach((v,i)=>{
    if(v){id.data[i*4]=r;id.data[i*4+1]=g;id.data[i*4+2]=b;id.data[i*4+3]=255;}
  });
  putWorkImageData(id);
  S.mask.fill(0); S.previewData=null; S.undoStack=[];
  renderAll(); updateBtns(); toast(`紙色(${r},${g},${b})で塗りつぶしました`);
}

function fillPicked() {
  if (!S.pickedColor) { toast('先に🎨色抽出をしてください'); return; }
  if (!S.mask.some(v=>v)) { toast('マスクが空です'); return; }
  const id = getWorkImageData();
  const {r,g,b}=S.pickedColor;
  S.mask.forEach((v,i)=>{
    if(v){id.data[i*4]=r;id.data[i*4+1]=g;id.data[i*4+2]=b;id.data[i*4+3]=255;}
  });
  putWorkImageData(id);
  S.mask.fill(0); S.previewData=null; S.undoStack=[];
  renderAll(); updateBtns(); toast('抽出色で塗りつぶしました');
}

// ─── Inpaint ───
function doInpaint() {
  if (!S.mask.some(v=>v)) { toast('マスクが空です'); return; }
  toast('Inpaint計算中…', 8000);
  setTimeout(() => {
    const id = getWorkImageData();
    const d = new Uint8ClampedArray(id.data);
    const W=S.W, H=S.H, R=Math.max(3,S.ipRadius);
    const passes = S.ipMethod==='ns' ? 3 : 2;
    let cur = new Uint8ClampedArray(d);
    for (let p=0;p<passes;p++) {
      const nxt = new Uint8ClampedArray(cur);
      for (let y=0;y<H;y++) for (let x=0;x<W;x++) {
        if (!S.mask[y*W+x]) continue;
        let sr=0,sg=0,sb=0,sw=0;
        for (let dy=-R;dy<=R;dy++) for (let dx=-R;dx<=R;dx++) {
          const nx=x+dx,ny=y+dy;
          if(nx<0||ny<0||nx>=W||ny>=H||S.mask[ny*W+nx]) continue;
          const d2=dx*dx+dy*dy; if(d2>R*R) continue;
          const w=1/(d2+1e-6), i=(ny*W+nx)*4;
          sr+=cur[i]*w; sg+=cur[i+1]*w; sb+=cur[i+2]*w; sw+=w;
        }
        if(sw>0){const i=(y*W+x)*4;nxt[i]=sr/sw;nxt[i+1]=sg/sw;nxt[i+2]=sb/sw;nxt[i+3]=255;}
      }
      cur=nxt;
    }
    const out = new ImageData(cur, W, H);
    S.previewData = out;
    renderAll();
    toast('プレビュー表示中 — Enter で確定', 6000);
  }, 30);
}

function applyInpaint() {
  if (!S.previewData) return;
  putWorkImageData(S.previewData);
  S.previewData=null; S.mask.fill(0); S.undoStack=[];
  renderAll(); updateBtns(); toast('確定しました');
}

// ─── Save ───
function saveImg() {
  const oc = document.createElement('canvas');
  oc.width = S.W; oc.height = S.H;
  oc.getContext('2d').drawImage(S.workCanvas, 0, 0);
  const dataUrl = oc.toDataURL('image/png');

  // モーダル表示
  let modal = document.getElementById('saveModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'saveModal';
    modal.style.cssText = `
      position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    `;
    modal.innerHTML = `
      <p style="color:#eee;font-size:13px;font-family:sans-serif">
        画像を右クリック →「名前を付けて画像を保存」で保存できます
      </p>
      <img id="savePreviewImg" style="max-width:90vw;max-height:75vh;border:1px solid #555;border-radius:4px">
      <button onclick="document.getElementById('saveModal').style.display='none'"
        style="background:#e94560;color:#fff;border:none;border-radius:6px;padding:7px 24px;cursor:pointer;font-size:13px">
        ✕ 閉じる
      </button>
    `;
    document.body.appendChild(modal);
  }
  document.getElementById('savePreviewImg').src = dataUrl;
  modal.style.display = 'flex';
  toast('右クリック →「名前を付けて画像を保存」で保存してください', 5000);
}

// ─── Mode ───
function setMode(m) {
  S.mode=m; S.roiStart=null; S.roiEnd=null;
  ['brush','pick','fill'].forEach(id=>{
    document.getElementById('btn'+id[0].toUpperCase()+id.slice(1)).classList.toggle('active',id===m);
  });
  cUI.style.cursor = m==='brush' ? 'none' : 'crosshair';
  renderAll();
}

function updateSwatch() {
  const sw=document.getElementById('swatch');
  if (S.pickedColor) {
    const {r,g,b}=S.pickedColor;
    sw.style.cssText=`display:block;background:rgb(${r},${g},${b})`;
  } else sw.style.display='none';
}

function updateBtns() {
  const has=!!S.workCanvas;
  ['btnSave','btnInpaint','btnPaperFill','btnPickFill','btnReset','btnFit','btn100'].forEach(id=>{
    document.getElementById(id).disabled=!has;
  });
  document.getElementById('btnUndo').disabled=!has||!S.undoStack.length;
}

// ─── Mouse ───
cUI.addEventListener('mousedown', e=>{
  if(!S.workCanvas) return; e.preventDefault();
  const {offsetX:sx, offsetY:sy}=e;

  if(e.button===1||(e.button===0&&e.shiftKey)){
    S.panStart={sx,sy,vx:S.vx,vy:S.vy}; return;
  }
  const [ix,iy]=s2i(sx,sy);

  if(S.mode!=='brush'){
    S.roiDrag=true; S.roiStart=[ix,iy]; S.roiEnd=[ix,iy]; return;
  }
  pushUndo();
  S.drawing=true; S.erasing=e.button===2; S.lastPt=[ix,iy];
  paintMask(ix,iy,ix,iy,S.erasing); renderAll();
});

cUI.addEventListener('mousemove', e=>{
  if(!S.workCanvas) return;
  const {offsetX:sx, offsetY:sy}=e;
  const sc=getScale();

  // ブラシカーソル
  ctxUI.clearRect(0,0,cUI.width,cUI.height);
  if(S.mode==='brush'){
    const pr=Math.max(1, S.brushSize*sc);
    ctxUI.beginPath(); ctxUI.arc(sx,sy,pr,0,Math.PI*2);
    ctxUI.strokeStyle='rgba(0,255,0,.8)'; ctxUI.lineWidth=1.5; ctxUI.stroke();
  }
  // ROI rect
  if(S.mode!=='brush'&&S.roiStart&&S.roiEnd){
    const [x0,y0]=i2s(...S.roiStart), [x1,y1]=i2s(...S.roiEnd);
    ctxUI.strokeStyle=S.mode==='pick'?'#00f0f0':'#f000f0';
    ctxUI.lineWidth=1.5; ctxUI.setLineDash([5,3]);
    ctxUI.strokeRect(x0,y0,x1-x0,y1-y0); ctxUI.setLineDash([]);
  }

  // pan
  if(S.panStart){
    S.vx=S.panStart.vx-(sx-S.panStart.sx)/sc;
    S.vy=S.panStart.vy-(sy-S.panStart.sy)/sc;
    clamp(); renderAll(); return;
  }
  const [ix,iy]=s2i(sx,sy);
  if(S.roiDrag){ S.roiEnd=[ix,iy]; return; }
  if(S.drawing&&S.lastPt){
    paintMask(S.lastPt[0],S.lastPt[1],ix,iy,S.erasing);
    S.lastPt=[ix,iy]; renderAll();
  }
});

cUI.addEventListener('mouseup', e=>{
  if(!S.workCanvas) return;
  const [ix,iy]=s2i(e.offsetX,e.offsetY);
  if(S.panStart){S.panStart=null;return;}
  if(S.roiDrag){
    S.roiDrag=false; S.roiEnd=[ix,iy];
    if(S.mode==='pick') pickColor();
    else if(S.mode==='fill') fillROI();
    renderAll(); return;
  }
  S.drawing=false; S.lastPt=null;
});

cUI.addEventListener('mouseleave',()=>{
  S.drawing=false; S.lastPt=null;
  ctxUI.clearRect(0,0,cUI.width,cUI.height);
});

cUI.addEventListener('wheel',e=>{
  e.preventDefault();
  if(!S.workCanvas) return;
  zoomAt(e.offsetX,e.offsetY,e.deltaY<0?1.2:1/1.2);
  renderAll();
},{passive:false});

cUI.addEventListener('contextmenu',e=>e.preventDefault());

// ─── Keyboard ───
document.addEventListener('keydown',e=>{
  if(!S.workCanvas||e.target.tagName==='INPUT') return;
  if((e.key==='z'||e.key==='u')&&(e.ctrlKey||e.metaKey||e.key==='u')){e.preventDefault();undo();return;}
  if(e.key==='s'&&(e.ctrlKey||e.metaKey)){e.preventDefault();saveImg();return;}
  switch(e.key){
    case 'b':setMode('brush');break;
    case 'p':setMode('pick');break;
    case 'g':setMode('fill');break;
    case 'i':doInpaint();break;
    case 'Enter':applyInpaint();break;
    case 'f':fillPaper();break;
    case 'k':fillPicked();break;
    case 'r':S.mask.fill(0);S.previewData=null;S.undoStack=[];renderAll();updateBtns();break;
    case '0':fitView();renderAll();break;
    case '1':S.zoom=1;S.vx=0;S.vy=0;renderAll();break;
    case 'm':
      S.ipMethod=S.ipMethod==='telea'?'ns':'telea';
      document.getElementById('btnMethod').textContent=S.ipMethod.toUpperCase();
      S.previewData=null; break;
    case '[':S.brushSize=Math.max(2,S.brushSize-2);
      document.getElementById('slBrush').value=S.brushSize;
      document.getElementById('vBrush').textContent=S.brushSize;break;
    case ']':S.brushSize=Math.min(120,S.brushSize+2);
      document.getElementById('slBrush').value=S.brushSize;
      document.getElementById('vBrush').textContent=S.brushSize;break;
  }
});

// ─── Controls ───
document.getElementById('btnOpen').onclick=
document.getElementById('btnOpen2').onclick=()=>document.getElementById('fileInput').click();

document.getElementById('fileInput').onchange=e=>{
  const f=e.target.files[0]; if(f) loadFile(f);
  e.target.value=''; // 同じファイルを再選択できるようリセット
};

document.getElementById('btnSave').onclick=saveImg;
document.getElementById('btnBrush').onclick=()=>setMode('brush');
document.getElementById('btnPick').onclick=()=>setMode('pick');
document.getElementById('btnFill').onclick=()=>setMode('fill');
document.getElementById('btnInpaint').onclick=doInpaint;
document.getElementById('btnPaperFill').onclick=fillPaper;
document.getElementById('btnPickFill').onclick=fillPicked;
document.getElementById('btnUndo').onclick=undo;
document.getElementById('btnReset').onclick=()=>{
  pushUndo(); S.mask.fill(0); S.previewData=null; renderAll();
};
document.getElementById('btnFit').onclick=()=>{fitView();renderAll();};
document.getElementById('btn100').onclick=()=>{S.zoom=1;S.vx=0;S.vy=0;renderAll();};
document.getElementById('btnMethod').onclick=()=>{
  S.ipMethod=S.ipMethod==='telea'?'ns':'telea';
  document.getElementById('btnMethod').textContent=S.ipMethod.toUpperCase();
  S.previewData=null;
};

document.getElementById('slBrush').oninput=e=>{
  S.brushSize=+e.target.value;
  document.getElementById('vBrush').textContent=S.brushSize;
};
document.getElementById('slRadius').oninput=e=>{
  S.ipRadius=+e.target.value;
  document.getElementById('vRadius').textContent=S.ipRadius;
  S.previewData=null;
};

// ─── Drag & Drop ───
const dz=document.getElementById('dropzone');
wrap.addEventListener('dragover',e=>{e.preventDefault();dz.style.background='rgba(14,52,160,.9)';});
wrap.addEventListener('dragleave',()=>{dz.style.background='';});
wrap.addEventListener('drop',e=>{
  e.preventDefault(); dz.style.background='';
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/')) loadFile(f);
});

window.addEventListener('resize',()=>{if(S.workCanvas)renderAll();});
</script>
</body>
</html>
